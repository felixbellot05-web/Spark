name: Daily NBA Bets Update

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC = 06:00 CET (07:00 CEST in summer)
  workflow_dispatch:        # Allow manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate daily picks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_picks.py

      - name: Commit and push updated app
        run: |
          git config --global user.email "nba-bets-bot@auto.com"
          git config --global user.name "NBA Bets Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "NBA picks update $(date +'%Y-%m-%d')"
          git push
